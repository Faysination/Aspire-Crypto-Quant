# /etc/nginx/conf.d/crypto.aspiretekstudio.com.conf
# ──────────────────────────────────────────────────────
# Add this file and: sudo systemctl reload nginx

server {
    listen 80;
    server_name crypto.aspiretekstudio.com;

    # Redirect HTTP → HTTPS (after certbot setup)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name crypto.aspiretekstudio.com;

    # SSL (run: sudo certbot --nginx -d crypto.aspiretekstudio.com)
    ssl_certificate     /etc/letsencrypt/live/crypto.aspiretekstudio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crypto.aspiretekstudio.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Dashboard API (Flask on port 5001)
    location /api/ {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://127.0.0.1:5001;
    }

    # Static dashboard frontend (build output from the React dashboard)
    location / {
        root  /home/ec2-user/regime_bot/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
